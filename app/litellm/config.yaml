# LiteLLM Responses bridge config.
#
# Exposes /responses (Responses API) for Codex CLI and routes per model:
#   - gpt-5.4         : Azure OpenAI, native Responses (passthrough)
#   - grok-4.3        : Foundry Model Inference, Responses NOT supported -> Chat bridge
#   - DeepSeek-V4-Pro : Foundry Model Inference, Responses NOT supported -> Chat bridge
#
# Backend auth is Entra ID (managed identity), NOT API keys:
#   use_azure_ad: true makes LiteLLM fetch an AAD token via DefaultAzureCredential. The Container
#   App runs with a user-assigned identity (AZURE_CLIENT_ID env) that has the backend RBAC roles.
# Endpoints are injected as env vars by the Container App (see modules/control_plane).

model_list:
  # --- gpt (Azure OpenAI) — native Responses passthrough ---
  - model_name: gpt-5.4
    litellm_params:
      model: azure/gpt-5.4
      api_base: os.environ/AOAI_API_BASE
      api_version: "2025-04-01-preview"

  # --- partner/OSS (Foundry Model Inference) — Responses -> Chat bridge ---
  # NOTE: the Responses->Chat bridge forwards tool_choice even on requests with NO tools, which
  # grok/DeepSeek (Foundry Model Inference) reject with 400. Codex always sends tools, so agent
  # traffic is unaffected; only tool-less probes hit this. additional_drop_params does NOT fix it
  # (the bridge re-adds tool_choice after param filtering) — tracked as a LiteLLM bridge quirk.
  - model_name: grok-4.3
    litellm_params:
      model: azure_ai/grok-4.3
      api_base: os.environ/FOUNDRY_API_BASE
      use_chat_completions_api: true

  - model_name: DeepSeek-V4-Pro
    litellm_params:
      model: azure_ai/DeepSeek-V4-Pro
      api_base: os.environ/FOUNDRY_API_BASE
      use_chat_completions_api: true

general_settings:
  # APIM authenticates to LiteLLM with this key (Authorization: Bearer). Injected via env, not baked.
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  # Backend auth = Entra ID (managed identity). LiteLLM fetches a token via DefaultAzureCredential
  # (Container App runs with AZURE_CLIENT_ID set) and refreshes it — no api_key anywhere.
  enable_azure_ad_token_refresh: true
