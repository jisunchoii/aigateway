<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Brownfield model backend reuse topology</title>
  <desc id="desc">Topology for reusing an existing Foundry account. Existing account and model deployments remain unchanged. Gateway resources add RBAC and a Private Endpoint connection.</desc>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 400 16px Segoe UI, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .customer { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.2; rx: 22; }
      .gateway { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.2; rx: 22; }
      .terraform { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.2; rx: 18; }
      .account { fill: #ffffff; stroke: #ea580c; stroke-width: 2; rx: 14; }
      .model { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 12; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .pe { fill: #ffffff; stroke: #059669; stroke-width: 2; rx: 14; }
      .rbac { fill: #ffffff; stroke: #7c3aed; stroke-width: 2; rx: 14; }
      .link { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .card { fill: #ffffff; stroke: #7c3aed; stroke-width: 1.8; rx: 12; }
      .safe { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 14; }
      .nochange { fill: none; stroke: #059669; stroke-width: 2.2; stroke-dasharray: 9 7; rx: 16; }
      .text { font: 700 17px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 400 13.5px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .laneTitle { font: 700 19px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .label { font: 700 13px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2.7; fill: none; marker-end: url(#arrowBlue); }
      .purpleArrow { stroke: #7c3aed; stroke-width: 2.5; fill: none; marker-end: url(#arrowPurple); }
    </style>
  </defs>

  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="750" y="54">모델 백엔드 기존 계정 재사용 토폴로지</text>
  <text class="subtitle" x="750" y="84">기존 계정과 모델은 유지하고, 게이트웨이 VNet에 Private Endpoint와 RBAC만 새로 추가합니다.</text>

  <rect class="customer" x="70" y="145" width="540" height="430"/>
  <text class="laneTitle" x="340" y="183">고객 기존 AI 리소스</text>
  <text class="small" x="340" y="208">기존 리소스 그룹 / 기존 운영 계정</text>

  <text class="label" x="340" y="232">Terraform create / update / delete 없음</text>
  <rect class="nochange" x="110" y="242" width="460" height="292"/>

  <rect class="account" x="130" y="265" width="420" height="235"/>
  <text class="text" x="340" y="294">Existing AIServices / Foundry account</text>
  <text class="small" x="340" y="324">data source로 읽기만 함</text>
  <text class="small" x="340" y="347">disableLocalAuth=true</text>
  <text class="small" x="340" y="370">publicNetworkAccess=Disabled</text>

  <rect class="model" x="170" y="405" width="340" height="74"/>
  <text class="text" x="340" y="430">Existing model deployments</text>
  <text class="small" x="340" y="455">기존 gpt / partner / OSS 배포 유지</text>

  <rect class="gateway" x="890" y="145" width="540" height="430"/>
  <text class="laneTitle" x="1160" y="183">Gateway 관리 리소스</text>
  <text class="small" x="1160" y="208">새 게이트웨이 리소스 그룹 / gateway VNet</text>

  <rect class="box" x="950" y="265" width="180" height="90"/>
  <text class="text" x="1040" y="292">APIM MI</text>
  <text class="small" x="1040" y="317">managed identity</text>
  <text class="small" x="1040" y="336">backend auth</text>

  <rect class="box" x="1190" y="265" width="190" height="90"/>
  <text class="text" x="1285" y="292">APIM Gateway</text>
  <text class="small" x="1285" y="317">policy pipeline</text>
  <text class="small" x="1285" y="336">client 요청 처리</text>

  <rect class="pe" x="950" y="415" width="430" height="90"/>
  <text class="text" x="1165" y="442">New Private Endpoint</text>
  <text class="small" x="1165" y="467">gateway VNet 안에 생성</text>
  <text class="small" x="1165" y="486">기존 Foundry 계정으로 private 연결</text>

  <rect class="rbac" x="665" y="274" width="170" height="72"/>
  <text class="text" x="750" y="299">RBAC</text>
  <text class="small" x="750" y="323">APIM MI 권한 부여</text>

  <rect class="link" x="665" y="424" width="170" height="72"/>
  <text class="text" x="750" y="449">Private Link</text>
  <text class="small" x="750" y="473">private traffic</text>

  <path class="purpleArrow" d="M950 310 H835"/>
  <path class="purpleArrow" d="M665 310 H550"/>

  <path class="arrow" d="M1285 355 V415"/>
  <path class="arrow" d="M950 460 H835"/>
  <path class="arrow" d="M665 460 H550"/>

  <rect class="terraform" x="215" y="645" width="1070" height="130"/>
  <text class="laneTitle" x="750" y="680">Terraform 재사용 모드에서 하는 일</text>

  <rect class="card" x="265" y="710" width="285" height="44"/>
  <text class="small" x="407.5" y="732">기존 계정을 data source로 참조</text>

  <rect class="card" x="607" y="710" width="285" height="44"/>
  <text class="small" x="749.5" y="732">Private Endpoint 신규 생성</text>

  <rect class="card" x="950" y="710" width="285" height="44"/>
  <text class="small" x="1092.5" y="732">APIM MI에 backend 호출 RBAC 부여</text>

  <rect class="safe" x="380" y="812" width="740" height="42"/>
  <text class="text" x="750" y="833">안전 경계: 기존 계정은 유지하고 gateway가 거버넌스와 private 연결만 담당</text>
</svg>
