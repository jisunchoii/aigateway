<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">APIM Policy Pipeline</title>
  <desc id="desc">A clean left-to-right APIM policy flow. Client requests enter APIM, are normalized, mapped to a consumer, checked against model permissions, optionally switched by budget state, token-limited, authenticated with managed identity, and sent to the private backend. Configuration and observability are shown as separate supporting lanes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Segoe UI, Arial, sans-serif; fill: #475569; }
      .lane { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 18; }
      .configLane { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 18; }
      .obsLane { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 18; }
      .laneTitle { font: 700 16px Segoe UI, Arial, sans-serif; fill: #1e3a8a; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .configBox { fill: #ffffff; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .obsBox { fill: #ffffff; stroke: #059669; stroke-width: 2; rx: 12; }
      .decision { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; }
      .stop { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .text { font: 700 15px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 400 12.5px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .note { font: 400 12px Segoe UI, Arial, sans-serif; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .support { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowGray); }
      .label { font: 700 12px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="760"/>
  <text class="title" x="800" y="46">APIM Policy Pipeline</text>
  <text class="subtitle" x="800" y="74">Main request path is left-to-right. Configuration sync and observability are supporting flows.</text>

  <!-- Main request path -->
  <rect class="lane" x="45" y="115" width="1510" height="300"/>
  <text class="laneTitle" x="75" y="145">Request path</text>

  <rect class="box" x="80" y="205" width="145" height="78"/>
  <text class="text" x="152.5" y="230">Client</text>
  <text class="small" x="152.5" y="254">VS Code / CLI</text>
  <text class="small" x="152.5" y="272">/ direct API</text>

  <rect class="box" x="260" y="205" width="155" height="78"/>
  <text class="text" x="337.5" y="230">Normalize</text>
  <text class="small" x="337.5" y="254">path-route or body</text>
  <text class="small" x="337.5" y="272">to backend v1</text>

  <rect class="box" x="440" y="205" width="140" height="78"/>
  <text class="text" x="510" y="230">Consumer</text>
  <text class="small" x="510" y="254">subscription display</text>
  <text class="small" x="510" y="272">name or JWT claim</text>

  <polygon class="decision" points="720,194 830,244 720,294 610,244"/>
  <text class="text" x="720" y="237">Allowed?</text>
  <text class="small" x="720" y="260">model list</text>

  <rect class="stop" x="645" y="330" width="150" height="58"/>
  <text class="text" x="720" y="351">403</text>
  <text class="small" x="720" y="371">not allowed</text>

  <rect class="box" x="870" y="205" width="150" height="78"/>
  <text class="text" x="945" y="230">Select model</text>
  <text class="small" x="945" y="254">budget state may set</text>
  <text class="small" x="945" y="272">effective model</text>

  <polygon class="decision" points="1150,194 1260,244 1150,294 1040,244"/>
  <text class="text" x="1150" y="237">Within limit?</text>
  <text class="small" x="1150" y="260">TPM + quota</text>

  <rect class="stop" x="1075" y="330" width="150" height="58"/>
  <text class="text" x="1150" y="351">429</text>
  <text class="small" x="1150" y="371">rate limited</text>

  <rect class="box" x="1300" y="205" width="125" height="78"/>
  <text class="text" x="1362.5" y="230">MI auth</text>
  <text class="small" x="1362.5" y="254">APIM managed</text>
  <text class="small" x="1362.5" y="272">identity token</text>

  <rect class="box" x="1450" y="205" width="105" height="78"/>
  <text class="text" x="1502.5" y="230">Backend</text>
  <text class="small" x="1502.5" y="254">private</text>
  <text class="small" x="1502.5" y="272">endpoint</text>

  <rect class="box" x="1290" y="330" width="265" height="58"/>
  <text class="text" x="1422.5" y="351">Response</text>
  <text class="small" x="1422.5" y="371">adds model-switch headers when changed</text>

  <path class="edge" d="M225 244 H260"/>
  <path class="edge" d="M415 244 H440"/>
  <path class="edge" d="M580 244 H610"/>
  <path class="edge" d="M830 244 H870"/>
  <text class="label" x="850" y="228">yes</text>
  <path class="edge" d="M720 294 V330"/>
  <text class="label" x="744" y="318">no</text>
  <path class="edge" d="M1020 244 H1040"/>
  <path class="edge" d="M1260 244 H1300"/>
  <text class="label" x="1280" y="228">yes</text>
  <path class="edge" d="M1150 294 V330"/>
  <text class="label" x="1174" y="318">no</text>
  <path class="edge" d="M1425 244 H1450"/>
  <path class="edge" d="M1502.5 283 V330"/>

  <!-- Configuration path -->
  <rect class="configLane" x="45" y="470" width="715" height="205"/>
  <text class="laneTitle" x="75" y="500" fill="#5b21b6">Configuration path</text>

  <rect class="configBox" x="105" y="555" width="170" height="72"/>
  <text class="text" x="190" y="579">Cosmos DB</text>
  <text class="small" x="190" y="603">global, pricing,</text>
  <text class="small" x="190" y="621">consumer docs</text>

  <rect class="configBox" x="335" y="555" width="185" height="72"/>
  <text class="text" x="427.5" y="579">config-sync</text>
  <text class="small" x="427.5" y="603">calculates budget</text>
  <text class="small" x="427.5" y="621">publishes bundle</text>

  <rect class="configBox" x="580" y="555" width="135" height="72"/>
  <text class="text" x="647.5" y="579">APIM named</text>
  <text class="small" x="647.5" y="603">values</text>
  <text class="small" x="647.5" y="621">runtime config</text>

  <path class="edge" d="M275 591 H335"/>
  <path class="edge" d="M520 591 H580"/>
  <path class="support" d="M647.5 555 C647.5 500 720 420 720 294"/>
  <text class="label" x="652" y="465">used by policy</text>

  <!-- Observability path -->
  <rect class="obsLane" x="840" y="470" width="715" height="205"/>
  <text class="laneTitle" x="870" y="500" fill="#047857">Observability path</text>

  <rect class="obsBox" x="905" y="555" width="185" height="72"/>
  <text class="text" x="997.5" y="579">App Insights</text>
  <text class="small" x="997.5" y="603">requests, traces,</text>
  <text class="small" x="997.5" y="621">token metrics</text>

  <rect class="obsBox" x="1160" y="555" width="205" height="72"/>
  <text class="text" x="1262.5" y="579">Admin UI</text>
  <text class="small" x="1262.5" y="603">dashboard, logs,</text>
  <text class="small" x="1262.5" y="621">downgrade events</text>

  <path class="edge" d="M1090 591 H1160"/>
  <path class="support" d="M1422.5 388 C1300 465 1120 505 997.5 555"/>
  <text class="label" x="1205" y="500">logs and metrics</text>
</svg>
