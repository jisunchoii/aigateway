<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Greenfield vs Brownfield deployment decision</title>
  <desc id="desc">Decision flow for choosing whether Terraform creates new AIServices and model deployments, or reuses an existing Foundry account by reading it as data and adding only Private Endpoint and RBAC.</desc>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 400 16px Segoe UI, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .decision { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2.4; }
      .greenLane { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 22; }
      .brownLane { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 22; }
      .commonLane { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 20; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .greenBox { fill: #ffffff; stroke: #059669; stroke-width: 2; rx: 14; }
      .brownBox { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .warnBox { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 14; }
      .text { font: 700 17px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 400 13.5px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .laneTitle { font: 700 19px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .label { font: 700 13px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrowSlate); }
    </style>
  </defs>

  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="750" y="54">Greenfield vs Brownfield 선택</text>
  <text class="subtitle" x="750" y="84">모델 백엔드를 새로 만들지, 기존 Foundry 계정을 재사용할지 먼저 결정합니다.</text>

  <polygon class="decision" points="750,130 990,245 750,360 510,245"/>
  <text class="text" x="750" y="224">기존 AIServices / Foundry 계정과</text>
  <text class="text" x="750" y="248">모델 배포가 이미 있는가?</text>
  <text class="small" x="750" y="278">동일 구독 내에서 gateway가 붙을 대상</text>

  <rect class="greenLane" x="75" y="415" width="630" height="345"/>
  <text class="laneTitle" x="390" y="452">아니오 — Greenfield</text>
  <text class="small" x="390" y="477">Terraform이 모델 백엔드까지 새로 생성</text>

  <rect class="greenBox" x="125" y="520" width="245" height="85"/>
  <text class="text" x="247.5" y="546">새 계정 생성</text>
  <text class="small" x="247.5" y="571">Azure OpenAI / AIServices</text>
  <text class="small" x="247.5" y="590">public access와 key auth off</text>

  <rect class="greenBox" x="410" y="520" width="245" height="85"/>
  <text class="text" x="532.5" y="546">모델 배포 생성</text>
  <text class="small" x="532.5" y="571">model_deployments</text>
  <text class="small" x="532.5" y="590">codexproj + 4 canonical models</text>

  <rect class="greenBox" x="125" y="635" width="530" height="78"/>
  <text class="text" x="390" y="660">Private Endpoint + APIM MI RBAC 생성</text>
  <text class="small" x="390" y="685">gateway 전용 VNet에서 새 backend 계정으로 private 연결</text>

  <rect class="brownLane" x="795" y="415" width="630" height="345"/>
  <text class="laneTitle" x="1110" y="452">예 — Brownfield</text>
  <text class="small" x="1110" y="477">기존 계정은 읽기 전용으로 참조하고 연결만 추가</text>

  <rect class="warnBox" x="845" y="510" width="245" height="95"/>
  <text class="text" x="967.5" y="535">직접 접근 차단</text>
  <text class="small" x="967.5" y="560">disableLocalAuth=true</text>
  <text class="small" x="967.5" y="580">publicNetworkAccess=Disabled</text>

  <rect class="brownBox" x="1130" y="510" width="245" height="95"/>
  <text class="text" x="1252.5" y="535">data로 읽기</text>
  <text class="small" x="1252.5" y="560">계정 생성/수정/삭제 없음</text>
  <text class="small" x="1252.5" y="580">모델 배포도 생성 안 함</text>

  <rect class="brownBox" x="845" y="635" width="530" height="78"/>
  <text class="text" x="1110" y="660">Private Endpoint + APIM MI RBAC만 생성</text>
  <text class="small" x="1110" y="685">기존 운영 모델 위에 gateway 거버넌스 레이어만 추가</text>

  <rect class="commonLane" x="240" y="805" width="1020" height="58"/>
  <text class="text" x="750" y="825">공통 결과: APIM Gateway가 인증, 모델 허용 목록, rate limit, budget switch, 관측성을 일관되게 적용</text>
  <text class="small" x="750" y="849">이후 배포 챕터에서 선택한 경로의 runbook을 따라갑니다.</text>

  <path class="arrow" d="M570 312 C445 360 390 375 390 415"/>
  <text class="label" x="428" y="371">아니오</text>
  <path class="arrow" d="M930 312 C1055 360 1110 375 1110 415"/>
  <text class="label" x="1072" y="371">예</text>

  <path class="arrow" d="M370 562.5 H410"/>
  <path class="arrow" d="M390 605 V635"/>
  <path class="arrow" d="M1090 557.5 H1130"/>
  <path class="arrow" d="M1110 605 V635"/>

  <path class="dash" d="M390 713 V805"/>
  <path class="dash" d="M1110 713 V805"/>
</svg>
