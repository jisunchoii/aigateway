<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">VS Code BYOK settings placeholder</title>
  <desc id="desc">Placeholder for VS Code screenshot showing chatLanguageModels.json with APIM custom model endpoints and model picker.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #1e1e1e; stroke: #64748b; stroke-width: 2; rx: 18; }
      .side { fill: #252526; }
      .editor { fill: #1e1e1e; stroke: #3f3f46; stroke-width: 1.5; rx: 10; }
      .panel { fill: #252526; stroke: #3f3f46; stroke-width: 1.5; rx: 10; }
      .dash { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 12 10; rx: 16; }
      .title { font: 700 30px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 400 16px Segoe UI, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .white { font: 700 16px Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .code { font: 400 14px Consolas, monospace; fill: #d4d4d4; }
      .key { fill: #9cdcfe; }
      .str { fill: #ce9178; }
      .muted { font: 400 13px Segoe UI, Arial, sans-serif; fill: #a1a1aa; }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="760"/>
  <text class="title" x="700" y="54">스크린샷 자리</text>
  <text class="subtitle" x="700" y="84">VS Code — chatLanguageModels.json과 APIM custom model 목록</text>
  <rect class="frame" x="90" y="125" width="1220" height="555"/>
  <rect class="side" x="90" y="125" width="210" height="555"/>
  <text class="white" x="125" y="165">EXPLORER</text>
  <text class="muted" x="125" y="210">settings</text>
  <text class="white" x="125" y="245">chatLanguageModels.json</text>
  <rect class="editor" x="325" y="155" width="620" height="470"/>
  <text class="white" x="355" y="195">chatLanguageModels.json</text>
  <text class="code" x="355" y="240">{</text>
  <text class="code key" x="380" y="270">"id"</text><text class="code" x="420" y="270">: </text><text class="code str" x="438" y="270">"gpt-5.6-sol"</text><text class="code" x="545" y="270">,</text>
  <text class="code key" x="380" y="300">"url"</text><text class="code" x="425" y="300">: </text><text class="code str" x="443" y="300">"https://&lt;apim-host&gt;/vscode/models/..."</text>
  <text class="code key" x="380" y="330">"requestHeaders"</text><text class="code" x="505" y="330">: {</text>
  <text class="code str" x="405" y="360">"Ocp-Apim-Subscription-Key"</text><text class="code" x="635" y="360">: </text><text class="code str" x="653" y="360">"&lt;key&gt;"</text>
  <text class="code" x="380" y="390">}</text>
  <rect class="panel" x="980" y="155" width="280" height="470"/>
  <text class="white" x="1010" y="195">Model picker</text>
  <text class="muted" x="1010" y="245">gpt-5.6-sol via APIM</text>
  <text class="muted" x="1010" y="285">FW-GLM-5.2 via APIM</text>
  <text class="muted" x="1010" y="325">DeepSeek-V4-Pro via APIM</text>
  <text class="muted" x="1010" y="365">grok-4.3 via APIM</text>
  <rect class="dash" x="110" y="115" width="1200" height="585"/>
  <text class="white center" x="700" y="706">실제 VS Code 스크린샷으로 교체하세요</text>
</svg>
