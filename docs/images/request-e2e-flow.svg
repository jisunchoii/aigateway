<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1760" viewBox="0 0 1400 1760" role="img" aria-labelledby="title desc">
  <title id="title">LLM Gateway Request End-to-End Flow</title>
  <desc id="desc">A static flowchart showing one request through APIM, model authorization, budget downgrade, token limit, backend call, metrics, and asynchronous budget evaluation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="dashArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Segoe UI, Arial, sans-serif; fill: #475569; }
      .section { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 14; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .decision { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; }
      .stop { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .metric { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; }
      .worker { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
      .text { font: 600 15px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 400 13px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .label { font: 600 13px Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#dashArrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1760"/>
  <text class="title" x="700" y="54">LLM Gateway - 1 Request End-to-End Flow</text>
  <text class="subtitle" x="700" y="84">Synchronous APIM request path plus asynchronous budget evaluation for future requests</text>

  <rect class="section" x="80" y="120" width="760" height="1480"/>
  <text class="label" x="460" y="150">Request path handled inline by APIM policy</text>

  <rect class="section" x="900" y="880" width="420" height="560"/>
  <text class="label" x="1110" y="910">Periodic budget loop</text>

  <!-- Main request path -->
  <rect class="box" x="290" y="180" width="340" height="66"/>
  <text class="text" x="460" y="205">1. Client / Consumer</text>
  <text class="small" x="460" y="227">OpenAI-compatible request</text>

  <rect class="box" x="290" y="280" width="340" height="66"/>
  <text class="text" x="460" y="305">2. APIM Gateway</text>
  <text class="small" x="460" y="327">single entry point</text>

  <polygon class="decision" points="460,380 650,440 460,500 270,440"/>
  <text class="text" x="460" y="431">3. Auth mode?</text>
  <text class="small" x="460" y="454">subscription key or Entra ID</text>

  <rect class="box" x="150" y="540" width="260" height="74"/>
  <text class="text" x="280" y="564">Validate APIM</text>
  <text class="small" x="280" y="587">subscription key</text>

  <rect class="box" x="510" y="540" width="260" height="74"/>
  <text class="text" x="640" y="564">validate-jwt</text>
  <text class="small" x="640" y="587">tenant / audience / issuer</text>

  <rect class="box" x="290" y="660" width="340" height="76"/>
  <text class="text" x="460" y="684">4. Derive consumerId</text>
  <text class="small" x="460" y="707">subscription display name or JWT claim</text>

  <rect class="box" x="290" y="775" width="340" height="76"/>
  <text class="text" x="460" y="799">5. Extract requested model</text>
  <text class="small" x="460" y="822">URL deployment segment or body model</text>

  <rect class="box" x="290" y="890" width="340" height="76"/>
  <text class="text" x="460" y="914">6. Load consumer config</text>
  <text class="small" x="460" y="937">APIM named value, base64 JSON</text>

  <polygon class="decision" points="460,1000 650,1060 460,1120 270,1060"/>
  <text class="text" x="460" y="1051">7. Model allowed?</text>
  <text class="small" x="460" y="1074">allowed_models or global default</text>

  <rect class="stop" x="95" y="1030" width="150" height="60"/>
  <text class="text" x="170" y="1053">403</text>
  <text class="small" x="170" y="1074">Forbidden</text>

  <polygon class="decision" points="460,1150 650,1210 460,1270 270,1210"/>
  <text class="text" x="460" y="1201">8. Active downgrade?</text>
  <text class="small" x="460" y="1224">active_downgrade.level</text>

  <rect class="box" x="150" y="1310" width="260" height="76"/>
  <text class="text" x="280" y="1334">No downgrade</text>
  <text class="small" x="280" y="1357">effectiveModel = requested</text>

  <rect class="box" x="510" y="1310" width="260" height="76"/>
  <text class="text" x="640" y="1334">Rewrite model</text>
  <text class="small" x="640" y="1357">ladder step, maybe cross backend</text>

  <rect class="box" x="290" y="1430" width="340" height="76"/>
  <text class="text" x="460" y="1454">9. Apply token limits</text>
  <text class="small" x="460" y="1477">llm-token-limit, counter-key = consumerId</text>

  <rect class="stop" x="95" y="1438" width="150" height="60"/>
  <text class="text" x="170" y="1461">429 / 403</text>
  <text class="small" x="170" y="1482">TPM or quota</text>

  <rect class="metric" x="290" y="1545" width="340" height="76"/>
  <text class="text" x="460" y="1569">10. Emit token metrics</text>
  <text class="small" x="460" y="1592">consumer / deployment / effectiveModel</text>

  <rect class="box" x="290" y="1660" width="340" height="66"/>
  <text class="text" x="460" y="1685">11. Backend call with MI</text>
  <text class="small" x="460" y="1707">OpenAI or Foundry, then response to client</text>

  <!-- Main arrows -->
  <path class="arrow" d="M460 246 L460 280"/>
  <path class="arrow" d="M460 346 L460 380"/>
  <path class="arrow" d="M345 476 L280 540"/>
  <path class="arrow" d="M575 476 L640 540"/>
  <text class="label" x="300" y="520">subscription-key</text>
  <text class="label" x="630" y="520">Entra ID</text>
  <path class="arrow" d="M280 614 L280 640 Q280 660 310 680"/>
  <path class="arrow" d="M640 614 L640 640 Q640 660 610 680"/>
  <path class="arrow" d="M460 736 L460 775"/>
  <path class="arrow" d="M460 851 L460 890"/>
  <path class="arrow" d="M460 966 L460 1000"/>
  <path class="arrow" d="M270 1060 L245 1060"/>
  <text class="label" x="240" y="1038">No</text>
  <path class="arrow" d="M460 1120 L460 1150"/>
  <text class="label" x="486" y="1141">Yes</text>
  <path class="arrow" d="M345 1246 L280 1310"/>
  <path class="arrow" d="M575 1246 L640 1310"/>
  <text class="label" x="306" y="1290">No</text>
  <text class="label" x="626" y="1290">Yes</text>
  <path class="arrow" d="M280 1386 L280 1410 Q280 1430 310 1448"/>
  <path class="arrow" d="M640 1386 L640 1410 Q640 1430 610 1448"/>
  <path class="arrow" d="M290 1468 L245 1468"/>
  <text class="label" x="265" y="1448">Exceeded</text>
  <path class="arrow" d="M460 1506 L460 1545"/>
  <text class="label" x="502" y="1530">Within limit</text>
  <path class="arrow" d="M460 1621 L460 1660"/>

  <!-- Budget loop -->
  <rect class="metric" x="970" y="960" width="280" height="70"/>
  <text class="text" x="1110" y="984">App Insights</text>
  <text class="small" x="1110" y="1006">Prompt / Completion / Total tokens</text>

  <rect class="worker" x="970" y="1070" width="280" height="70"/>
  <text class="text" x="1110" y="1094">config-sync worker</text>
  <text class="small" x="1110" y="1116">periodic job</text>

  <rect class="worker" x="970" y="1180" width="280" height="70"/>
  <text class="text" x="1110" y="1204">Calculate USD usage</text>
  <text class="small" x="1110" y="1226">usage x Cosmos pricing doc</text>

  <polygon class="decision" points="1110,1285 1260,1335 1110,1385 960,1335"/>
  <text class="text" x="1110" y="1327">Budget threshold?</text>
  <text class="small" x="1110" y="1349">80% / 100%</text>

  <rect class="worker" x="970" y="1430" width="280" height="70"/>
  <text class="text" x="1110" y="1454">Update Cosmos config</text>
  <text class="small" x="1110" y="1476">active_downgrade level 0 / 1 / 2</text>

  <rect class="worker" x="970" y="1540" width="280" height="70"/>
  <text class="text" x="1110" y="1564">Publish APIM config</text>
  <text class="small" x="1110" y="1586">update named value bundle</text>

  <path class="dash" d="M630 1583 C760 1583 820 995 970 995"/>
  <text class="label" x="835" y="1180">metrics feed</text>
  <path class="arrow" d="M1110 1030 L1110 1070"/>
  <path class="arrow" d="M1110 1140 L1110 1180"/>
  <path class="arrow" d="M1110 1250 L1110 1285"/>
  <path class="arrow" d="M1110 1385 L1110 1430"/>
  <path class="arrow" d="M1110 1500 L1110 1540"/>
  <path class="dash" d="M970 1575 C850 1575 820 928 630 928"/>
  <text class="label" x="850" y="1510">affects next requests</text>
</svg>