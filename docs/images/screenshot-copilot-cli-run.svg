<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Copilot CLI run placeholder</title>
  <desc id="desc">Placeholder for terminal screenshot showing GitHub Copilot CLI command and successful response through APIM gateway.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .terminal { fill: #0f172a; stroke: #475569; stroke-width: 2; rx: 18; }
      .bar { fill: #1e293b; rx: 18; }
      .dash { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 12 10; rx: 16; }
      .title { font: 700 30px Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 400 16px Segoe UI, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .code { font: 400 17px Consolas, monospace; fill: #d1d5db; }
      .green { fill: #86efac; }
      .blue { fill: #93c5fd; }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="760"/>
  <text class="title" x="700" y="54">스크린샷 자리</text>
  <text class="subtitle" x="700" y="84">Terminal — GitHub Copilot CLI가 APIM 경유로 응답</text>
  <rect class="terminal" x="130" y="130" width="1140" height="535"/>
  <rect class="bar" x="130" y="130" width="1140" height="48"/>
  <text class="code green" x="170" y="225">$ gh copilot explain "git rebase"</text>
  <text class="code blue" x="170" y="285">Copilot CLI → APIM /openai → private model backend</text>
  <text class="code" x="170" y="345">git rebase reapplies commits from one branch onto another base...</text>
  <text class="code" x="170" y="405">Status: 200 OK</text>
  <text class="code" x="170" y="445">Model: gpt-5.4</text>
  <rect class="dash" x="110" y="115" width="1200" height="585"/>
  <text class="code center" x="700" y="706">실제 Copilot CLI 실행 스크린샷으로 교체하세요</text>
</svg>
